name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Verify forge init
        run: |
          mkdir -p /tmp/forge-test
          cd /tmp/forge-test
          bun run ${{ github.workspace }}/bin/forge.ts init
          test -f .opencode/plugins/forge.ts
          test -f .opencode/agents/developer-agent.md
          test -d .opencode/skills/using-forge
          test -f .opencode/commands/forge/new-project.md
