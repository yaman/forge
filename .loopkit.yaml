skills_dir: skills/
max_iterations: 20

standard_verbs:
  - trigger
  - handoff
  - halt
  - call
  - wait
  - route
  - escalate
  - resume
  - notify
  - complete
  - add
  - advance
  - begin
  - capture
  - check
  - commit
  - compare
  - compute
  - configure
  - confirm
  - create
  - cross
  - decide
  - define
  - detect
  - determine
  - enumerate
  - execute
  - exit
  - flip
  - identify
  - loop
  - move
  - persist
  - post
  - produce
  - pull
  - push
  - query
  - read
  - record
  - require
  - run
  - set
  - signal
  - surface
  - translate
  - update
  - verify
  - write

halt_reasons:
  - stall
  - ambiguous
  - human-gate
  - unsafe
  - budget

canonical_loop_sections:
  - Entry Conditions
  - Loop State Schema
  - Single Iteration Step
  - Proof of Progress
  - State Transition Rule
  - Halt Conditions
  - Handoff Target

canonical_skill_sections:
  - Description
  - Rules
  - State Model

state_model_aliases:
  - State Model
  - The Loop
  - Loop States
  - States

enforced_states:
  - name: in-analysis
    agent: po-agent
    description: PO analyzes requirements, makes story development-ready
  - name: in-dev
    agent: developer-agent
    description: Developer builds story AC by AC
  - name: in-deskcheck
    agent: qa-agent
    description: QA verifies AC through UI desk check
  - name: in-qa
    agent: qa-agent
    description: QA runs full regression suite
  - name: in-acceptance
    agent: po-agent
    description: PO verifies delivered story matches intent
  - name: done
    agent: ""
    description: Story deployed to production and verified
  - name: halted-stall
    agent: ""
    description: No progress detected for N iterations
  - name: halted-ambiguous
    agent: ""
    description: Ambiguous state or conflicting signals
  - name: halted-human-gate
    agent: ""
    description: Requires human intervention or decision
  - name: halted-unsafe
    agent: ""
    description: Unsafe condition detected
